# Render Blueprint для вебхука Telegram-бота GoHobby.
# На render.com: New → Blueprint → выбрать этот репозиторий.
# Значения секретов (sync: false) задаются в дашборде Render вручную.
services:
  - type: web
    name: gohobby-telegram-webhook
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
